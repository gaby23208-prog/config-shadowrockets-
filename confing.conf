"comment">#!name = All In One Pro Max Ultimate (iOS 26 Edition)
"comment">#!desc = YouTube + Locket + SoundCloud + Spotify iOS 26 + Deezer HiFi + Apple Music + Disney+ + HBO Max + 15 Apps
"comment">#!author = Gấu Lỏz CUTO x Enhanced 2026.2
"comment">#!version = 2026.2.0
"comment">#!compatible = iOS 16/17/18/20/26

"comment"># ========================================
"comment"># Shadowrocket Unlock - All In One Ultimate
"comment"># Optimisé pour iOS 26 & Nouveaux Endpoints
"comment"># ========================================

"keyword">[Rule]
"comment"># YouTube Ads Block via UDP
AND,((DOMAIN-SUFFIX,googlevideo.com),(PROTOCOL,UDP)),REJECT
AND,((DOMAIN,youtubei.googleapis.com),(PROTOCOL,UDP)),REJECT

"comment"># Telemetry & Ad Tracking 2026
DOMAIN-SUFFIX,adservice.google.com,REJECT
DOMAIN-SUFFIX,ads.google.com,REJECT
DOMAIN-SUFFIX,googleadservices.com,REJECT
DOMAIN-SUFFIX,googlesyndication.com,REJECT
DOMAIN-SUFFIX,doubleclick.net,REJECT
DOMAIN-SUFFIX,app-measurement.com,REJECT
DOMAIN-SUFFIX,analytics.tiktok.com,REJECT

[Header Rewrite]
"comment"># RevenueCat (Locket & autres applications iOS 26)
^https?://api.revenuecat.com/.+/(receipts$|subscribers/?(.*?)*$) header-del x-revenuecat-etag
^https?://api.revenuecat.com/.+/(receipts$|subscribers/?(.*?)*$) header-del X-RevenueCat-ETag

"comment"># Spotify iOS 26 (Gestion des nouveaux en-têtes de cache et de personnalisation)
http-request ^https:\/\/(spclient\.wg\.spotify\.com|.*-spclient\.spotify\.com(:443)?)\/user-customization-service\/v1\/customize$ header-del if-none-match
http-request ^https:\/\/(spclient\.wg\.spotify\.com|.*-spclient\.spotify\.com(:443)?)\/bootstrap\/v1\/bootstrap$ header-del if-none-match

"comment"># Deezer HiFi iOS 26 (Forçage d'identification d'application premium)
http-request ^https:\/\/www\.deezer\.com\/api\/.* header-add x-app-id 266

"comment"># Disney+ Region & VIP Unlock
http-request ^https:\/\/disney\.plus\.com\/api\/.* header-del x-dpc-region

"comment"># HBO Max Region & Profile
http-request ^https:\/\/www\.hbomax\.com\/.* header-del x-hbo-max-region

[Url Rewrite]
"comment"># YouTube Ads Removal (Moteur 2026)
^https?:\/\/[\w-]+\.googlevideo\.com\/(?!(dclk_video_ads|videoplayback\?)).+&oad _ reject-200
^https?:\/\/(www|s)\.youtube\.com\/api\/stats\/ads _ reject-200
^https?:\/\/(www|s)\.youtube\.com\/(pagead|ptracking) _ reject-200
^https?:\/\/s\.youtube\.com\/api\/stats\/qoe\?adcontext _ reject-200
(^https?:\/\/[\w-]+\.googlevideo\.com\/(?!dclk_video_ads).+?)&ctier=L(&.+?),ctier,(.+) $1$2$3 302

"comment"># Spotify iOS 26 Quality Override
^https?:\/\/(spclient\.wg\.spotify\.com|.*-spclient\.spotify\.com)\/stream\/.* header-add x-spotify-quality highest

"comment"># Deezer HiFi Stream Override
^https?:\/\/e\.cd\.deezer\.com\/stream\/.* quality=high

"comment"># Disney+ & HBO Max US Region Bypass
^https?:\/\/disney\.plus\.com\/api\/device\/.* region=US
^https?:\/\/www\.hbomax\.com\/api\/device\/.* region=US

"keyword">[Script]
"comment"># ========================================
"comment"># Sub-Store (Gestionnaire de flux)
"comment"># ========================================
Sub-Store Core = type=http-request,pattern=^https?:\/\/sub\.store\/((download)|api\/(preview|sync|(utils\/node-info))),script-path=https://github.com/sub-store-org/Sub-Store/releases/latest/download/sub-store-1.min.js,requires-body=true,timeout=120
Sub-Store Simple = type=http-request,pattern=^https?:\/\/sub\.store,script-path=https://github.com/sub-store-org/Sub-Store/releases/latest/download/sub-store-0.min.js,requires-body=true
Sub-Store Sync = type=cron,cronexp=0 0 * * *,wake-system=1,timeout=120,script-path=https://github.com/sub-store-org/Sub-Store/releases/latest/download/cron-sync-artifacts.min.js

"comment"># ========================================
"comment"># YouTube Premium (Moteur V2 2026)
"comment"># ========================================
youtube.request = type=http-request,pattern=^https:\/\/youtubei\.googleapis\.com\/youtubei\/v1\/(browse|next|player|reel\/reel_watch_sequence|get_watch),requires-body=1,max-size=-1,binary-body-mode=1,engine=jsc,script-path=https://raw.githubusercontent.com/duyvinh09/Module_IOS/refs/heads/main/js/youtube.response.js
youtube.response = type=http-response,pattern=^https:\/\/youtubei\.googleapis\.com\/youtubei\/v1\/(browse|next|player|search|reel\/reel_watch_sequence|guide|account\/get_setting|get_watch),requires-body=1,max-size=-1,binary-body-mode=1,script-path=https://raw.githubusercontent.com/duyvinh09/Module_IOS/refs/heads/main/js/youtube.response.js,argument="{\"lyricLang\":\"fr\",\"captionLang\":\"fr\",\"blockUpload\":true,\"blockImmersive\":true,\"debug\":false}"

"comment"># ========================================
"comment"># Spotify iOS 26 (Optimisation 2026.2)
"comment"># ========================================
"comment">#!name=Spotify(iOS 26 Ultimate)
"comment">#!desc=Déverrouillage Premium complet, sauts illimités, qualité extrême, compatible iOS 26
spotify-json = type=http-request,pattern=^https:\/\/(spclient\.wg\.spotify\.com|.*-spclient\.spotify\.com(:443)?)\/(artistview\/v1\/artist|album-entity-view\/v2\/album)\/,requires-body=0,script-path=https://raw.githubusercontent.com/app2smile/rules/master/js/spotify-json.js
spotify-proto = type=http-response,pattern=^https:\/\/(spclient\.wg\.spotify\.com|.*-spclient\.spotify\.com(:443)?)\/(bootstrap\/v1\/bootstrap|user-customization-service\/v1\/customize)$,requires-body=1,binary-body-mode=1,max-size=0,script-path=https://raw.githubusercontent.com/app2smile/rules/master/js/spotify-proto.js,script-update-interval=0
spotify-premium = type=http-response,pattern=^https:\/\/(spclient\.wg\.spotify\.com|.*-spclient\.spotify\.com(:443)?)\/(account\/v1\/premium|subscription\/v1\/check)$,requires-body=1,max-size=0,script-path=https://raw.githubusercontent.com/app2smile/rules/master/js/spotify-premium.js

"comment"># ========================================
"comment"># SoundCloud Go+ (2026)
"comment"># ========================================
SoundCloudGo+ = type=http-response,pattern=https://api-mobile.soundcloud.com/configuration/ios,requires-body=1,script-path=https://raw.githubusercontent.com/duyvinh09/Module_IOS/refs/heads/main/js/SoundCloudGoPlus.js

"comment"># ========================================
"comment"># Deezer HiFi Premium (iOS 26 Edition)
"comment"># ========================================
DeezerPremium = type=http-response,pattern=^https:\/\/www\.deezer\.com\/api\/(user|subscription)\/,requires-body=1,max-size=131072,timeout=60,script-path=https://raw.githubusercontent.com/duyvinh09/Module_IOS/refs/heads/main/js/DeezerPremium.js

"comment"># ========================================
"comment"># Apple Music VIP Bypass (iOS 26 Edition)
"comment"># ========================================
AppleMusicUnlock = type=http-response,pattern=^https:\/\/buy\.itunes\.apple\.com\/verifyReceipt,requires-body=1,max-size=131072,timeout=60,script-path=https://raw.githubusercontent.com/duyvinh09/Module_IOS/refs/heads/main/js/AppleMusicUnlock.js

"comment"># ========================================
"comment"># Disney+ VIP Unlock
"comment"># ========================================
DisneyPlusPremium = type=http-response,pattern=^https:\/\/disney\.plus\.com\/api\/(device|account)\/,requires-body=1,max-size=131072,timeout=60,script-path=https://raw.githubusercontent.com/duyvinh09/Module_IOS/refs/heads/main/js/DisneyPlusPremium.js

"comment"># ========================================
"comment"># HBO Max Ultimate
"comment"># ========================================
HBOMaxUnlock = type=http-response,pattern=^https:\/\/www\.hbomax\.com\/api\/(device|profile)\/,requires-body=1,max-size=131072,timeout=60,script-path=https://raw.githubusercontent.com/duyvinh09/Module_IOS/refs/heads/main/js/HBOMaxUnlock.js

"comment"># ========================================
